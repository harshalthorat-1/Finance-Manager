<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --gray: #64748b;
            --light: #f8fafc;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header & Export */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            color: var(--dark);
            font-size: 1.8rem;
        }

        .export-btns {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--primary);
            color: white;
            font-size: 0.9rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button.btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        button.btn-outline:hover {
            background-color: var(--primary);
            color: white;
        }

        button.btn-danger {
            background-color: var(--danger);
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* Dashboard Cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card-title {
            color: var(--gray);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-primary { color: var(--primary); }

        .account-subtitle {
            font-size: 0.75rem;
            color: var(--gray);
            margin-top: 4px;
        }

        /* Main Grid Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Form Section */
        .form-section, .clients-section {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .section-title {
            margin-bottom: 16px;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--light);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            background-color: var(--light);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
        }

        .hidden {
            display: none !important;
        }

        /* Table Section */
        .table-section {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .filters {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--light);
            font-weight: 600;
            color: var(--gray);
        }

        tbody tr:hover {
            background-color: var(--light);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.income { background-color: #d1fae5; color: #065f46; }
        .badge.expense { background-color: #fee2e2; color: #991b1b; }
        .badge.transfer { background-color: #fef3c7; color: #92400e; }

        /* Client Earnings List */
        .client-list {
            list-style: none;
        }

        .client-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .client-item:last-child {
            border-bottom: none;
        }

        .client-name { font-weight: 500; }
        .client-total { font-weight: 600; color: var(--success); }

        /* Print Styles */
        @media print {
            body { background-color: white; padding: 0; }
            .form-section, .export-btns, .filters, th:last-child, td:last-child {
                display: none !important;
            }
            .main-grid { grid-template-columns: 1fr; }
            .card { box-shadow: none; border: 1px solid #000; }
            table { border: 1px solid #000; }
            th, td { border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Finance Manager</h1>
        <div class="export-btns">
            <button class="btn-outline" onclick="exportToCSV()">Export Excel (CSV)</button>
            <button class="btn-outline" onclick="window.print()">Export PDF</button>
        </div>
    </header>

    <!-- Dashboard Totals -->
    <div class="dashboard">
        <div class="card">
            <div class="card-title">Total Balance</div>
            <div class="card-value text-primary" id="dash-total-balance">₹0</div>
            <div class="account-subtitle">All Accounts combined</div>
        </div>
        <div class="card">
            <div class="card-title">Total Income</div>
            <div class="card-value text-success" id="dash-total-income">₹0</div>
        </div>
        <div class="card">
            <div class="card-title">Total Expenses</div>
            <div class="card-value text-danger" id="dash-total-expense">₹0</div>
        </div>
        <div class="card">
            <div class="card-title">Savings</div>
            <div class="card-value" id="dash-savings">₹0</div>
            <div class="account-subtitle">Income - Expenses</div>
        </div>
    </div>

    <!-- Accounts Balances -->
    <div class="dashboard" id="dashboard-accounts">
        <!-- Dynamically generated by JS -->
    </div>

    <div class="main-grid">
        <!-- Left Sidebar: Forms & Clients -->
        <div>
            <!-- Transaction Form -->
            <div class="form-section">
                <h2 class="section-title">Add Transaction</h2>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" onchange="handleTypeChange()" required>
                            <option value="Expense">Expense</option>
                            <option value="Income">Income</option>
                            <option value="Transfer">Transfer</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="account-label" for="account">Account</label>
                        <select id="account" required>
                            <!-- Options injected by JS -->
                        </select>
                    </div>
                    <div class="form-group hidden" id="to-account-group">
                        <label for="to-account">To Account</label>
                        <select id="to-account">
                            <option value="">-- Select Destination --</option>
                            <!-- Options injected by JS -->
                        </select>
                    </div>
                    <div class="form-group" id="category-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Recharge">Recharge</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Freelance">Freelance</option>
                            <option value="Salary">Salary</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" min="1" step="0.01" required placeholder="e.g. 500">
                    </div>
                    <div class="form-group hidden" id="client-group">
                        <label for="client">Client Name</label>
                        <input type="text" id="client" placeholder="e.g. Harshal Client A">
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" rows="2" placeholder="Optional details..."></textarea>
                    </div>
                    <button type="submit" style="width: 100%;">Save Transaction</button>
                </form>
            </div>

            <!-- Client Earnings -->
            <div class="clients-section">
                <h2 class="section-title">Clients & Earnings</h2>
                <ul class="client-list" id="client-list">
                    <!-- Client items injected by JS -->
                </ul>
            </div>

            <!-- Manage Accounts -->
            <div class="form-section">
                <h2 class="section-title">Manage Accounts</h2>
                <form id="account-form">
                    <div class="form-group">
                        <label for="new-acc-name">Account Name</label>
                        <input type="text" id="new-acc-name" placeholder="e.g. HDFC" required>
                    </div>
                    <div class="form-group">
                        <label for="new-acc-balance">Initial Balance (₹)</label>
                        <input type="number" id="new-acc-balance" value="0" step="0.01" required>
                    </div>
                    <button type="submit" style="width: 100%;">Add / Update Account</button>
                </form>
                <ul class="client-list" id="account-list" style="margin-top: 16px;">
                    <!-- Account items injected by JS -->
                </ul>
            </div>
        </div>

        <!-- Right Content: Table & Filters -->
        <div class="table-section">
            <h2 class="section-title">Transactions</h2>
            
            <div class="filters">
                <div class="filter-group">
                    <label for="filter-month">Month:</label>
                    <select id="filter-month" onchange="renderApp()">
                        <option value="All">All Time</option>
                        <!-- Options injected by JS -->
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-account">Account:</label>
                    <select id="filter-account" onchange="renderApp()">
                        <option value="All">All Accounts</option>
                        <!-- Options injected by JS -->
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Account</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Client</th>
                            <th>Notes</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table-body">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- STATE MANAGEMENT ---
    let transactions = JSON.parse(localStorage.getItem('finance_transactions')) || [];
    let accounts = JSON.parse(localStorage.getItem('finance_accounts')) || [
        { name: 'BOM', initialBalance: 0 },
        { name: 'SBI', initialBalance: 0 },
        { name: 'BOI', initialBalance: 0 }
    ];

    // Format currency
    const formatCurrency = (amount) => {
        return new Intl.NumberFormat('en-IN', {
            style: 'currency',
            currency: 'INR',
            minimumFractionDigits: 0,
            maximumFractionDigits: 2
        }).format(amount);
    };

    // Format date for display
    const formatDate = (dateStr) => {
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        return new Date(dateStr).toLocaleDateString('en-IN', options);
    };

    // --- FORM LOGIC ---
    // Toggle fields based on transaction type
    function handleTypeChange() {
        const type = document.getElementById('type').value;
        const toAccountGroup = document.getElementById('to-account-group');
        const clientGroup = document.getElementById('client-group');
        const categoryGroup = document.getElementById('category-group');
        const accountLabel = document.getElementById('account-label');
        const toAccountSelect = document.getElementById('to-account');

        if (type === 'Transfer') {
            toAccountGroup.classList.remove('hidden');
            clientGroup.classList.add('hidden');
            categoryGroup.classList.add('hidden');
            accountLabel.textContent = 'From Account';
            toAccountSelect.required = true;
        } else if (type === 'Income') {
            toAccountGroup.classList.add('hidden');
            clientGroup.classList.remove('hidden');
            categoryGroup.classList.remove('hidden');
            accountLabel.textContent = 'Account';
            toAccountSelect.required = false;
        } else {
            // Expense
            toAccountGroup.classList.add('hidden');
            clientGroup.classList.add('hidden');
            categoryGroup.classList.remove('hidden');
            accountLabel.textContent = 'Account';
            toAccountSelect.required = false;
        }
    }

    // Handle form submission
    document.getElementById('transaction-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const type = document.getElementById('type').value;
        const account = document.getElementById('account').value;
        const toAccount = document.getElementById('to-account').value;

        // Validation for Transfer
        if (type === 'Transfer' && account === toAccount) {
            alert("Cannot transfer to the same account!");
            return;
        }

        const transaction = {
            id: Date.now().toString(),
            date: document.getElementById('date').value,
            type: type,
            account: account,
            toAccount: type === 'Transfer' ? toAccount : null,
            category: type === 'Transfer' ? 'Transfer' : document.getElementById('category').value,
            amount: parseFloat(document.getElementById('amount').value),
            client: type === 'Income' ? document.getElementById('client').value.trim() : '',
            notes: document.getElementById('notes').value.trim()
        };

        transactions.push(transaction);
        saveData();
        renderApp();
        updateMonthFilterOptions();
        
        // Reset form, but keep current date
        const currentDate = document.getElementById('date').value;
        this.reset();
        document.getElementById('date').value = currentDate;
        handleTypeChange(); // Reset UI
    });

    // Delete transaction
    function deleteTransaction(id) {
        if(confirm("Are you sure you want to delete this transaction?")) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            renderApp();
            updateMonthFilterOptions();
        }
    }

    // Save to local storage
    function saveData() {
        localStorage.setItem('finance_transactions', JSON.stringify(transactions));
        localStorage.setItem('finance_accounts', JSON.stringify(accounts));
    }

    // --- ACCOUNT MANAGEMENT ---
    document.getElementById('account-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('new-acc-name').value.trim();
        const balance = parseFloat(document.getElementById('new-acc-balance').value);
        
        if(!name) return;

        // Check if exists, update or add
        const existing = accounts.find(a => a.name.toLowerCase() === name.toLowerCase());
        if(existing) {
            existing.initialBalance = balance;
        } else {
            accounts.push({ name: name, initialBalance: balance });
        }
        
        saveData();
        renderAccounts();
        renderApp();
        this.reset();
        document.getElementById('new-acc-balance').value = 0;
    });

    function deleteAccount(name) {
        // Check if transactions exist for this account
        const hasTransactions = transactions.some(t => t.account === name || t.toAccount === name);
        if(hasTransactions) {
            if(!confirm(`Warning: Transactions exist for "${name}". Deleting this account will orphan those transactions. Proceed?`)) {
                return;
            }
        } else {
            if(!confirm(`Delete account "${name}"?`)) return;
        }

        accounts = accounts.filter(a => a.name !== name);
        saveData();
        renderAccounts();
        renderApp();
    }

    function renderAccounts() {
        const accSelect = document.getElementById('account');
        const toAccSelect = document.getElementById('to-account');
        const filterAccSelect = document.getElementById('filter-account');
        const accList = document.getElementById('account-list');

        // Preserve current selections
        const currentAcc = accSelect.value;
        const currentToAcc = toAccSelect.value;
        const currentFilter = filterAccSelect.value;

        let options = '';
        let toOptions = '<option value="">-- Select Destination --</option>';
        let filterOptions = '<option value="All">All Accounts</option>';
        let listHtml = '';

        accounts.forEach(acc => {
            options += `<option value="${acc.name}">${acc.name}</option>`;
            toOptions += `<option value="${acc.name}">${acc.name}</option>`;
            filterOptions += `<option value="${acc.name}">${acc.name}</option>`;
            
            listHtml += `
                <li class="client-item">
                    <span><span class="client-name">${acc.name}</span> <span style="font-size:0.8rem;color:var(--gray)">(Init: ${formatCurrency(acc.initialBalance)})</span></span>
                    <button class="btn-danger" style="padding: 2px 6px; font-size: 0.7rem;" onclick="deleteAccount('${acc.name}')">Del</button>
                </li>
            `;
        });

        accSelect.innerHTML = options;
        toAccSelect.innerHTML = toOptions;
        filterAccSelect.innerHTML = filterOptions;
        accList.innerHTML = listHtml;

        // Restore selections if they still exist
        if(accounts.some(a => a.name === currentAcc)) accSelect.value = currentAcc;
        if(accounts.some(a => a.name === currentToAcc)) toAccSelect.value = currentToAcc;
        if(currentFilter === 'All' || accounts.some(a => a.name === currentFilter)) filterAccSelect.value = currentFilter;
    }

    // --- RENDER LOGIC ---

    // Populate Dynamic Month Filter
    function updateMonthFilterOptions() {
        const select = document.getElementById('filter-month');
        const currentValue = select.value;
        
        // Extract unique YYYY-MM
        const months = [...new Set(transactions.map(t => t.date.substring(0, 7)))].sort().reverse();
        
        let optionsHtml = '<option value="All">All Time</option>';
        months.forEach(month => {
            const [year, m] = month.split('-');
            const dateObj = new Date(year, m - 1);
            const monthName = dateObj.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
            optionsHtml += `<option value="${month}">${monthName}</option>`;
        });
        
        select.innerHTML = optionsHtml;
        if (months.includes(currentValue)) {
            select.value = currentValue;
        }
    }

    function renderApp() {
        // 1. Get filter criteria
        const filterMonth = document.getElementById('filter-month').value;
        const filterAccount = document.getElementById('filter-account').value;

        // 2. Filter Transactions for Table
        let filteredTx = transactions;
        
        if (filterMonth !== 'All') {
            filteredTx = filteredTx.filter(t => t.date.startsWith(filterMonth));
        }
        if (filterAccount !== 'All') {
            filteredTx = filteredTx.filter(t => t.account === filterAccount || t.toAccount === filterAccount);
        }

        // Sort by date descending
        filteredTx.sort((a, b) => new Date(b.date) - new Date(a.date));

        // 3. Calculate Global Balances (Ignores Date/Month filter to show REAL current balance)
        let balances = {};
        accounts.forEach(acc => {
            balances[acc.name] = acc.initialBalance || 0;
        });
        let totalIncome = 0;
        let totalExpense = 0;

        // Calculate balances based on ALL transactions
        transactions.forEach(t => {
            if (t.type === 'Income') {
                if (balances[t.account] !== undefined) balances[t.account] += t.amount;
            } else if (t.type === 'Expense') {
                if (balances[t.account] !== undefined) balances[t.account] -= t.amount;
            } else if (t.type === 'Transfer') {
                if (balances[t.account] !== undefined) balances[t.account] -= t.amount;
                if(balances[t.toAccount] !== undefined) balances[t.toAccount] += t.amount;
            }
        });

        // Calculate Income/Expense/Savings based on FILTERED transactions (so user sees monthly totals)
        filteredTx.forEach(t => {
            if (t.type === 'Income') totalIncome += t.amount;
            if (t.type === 'Expense') totalExpense += t.amount;
        });

        // Update Dashboard UI
        let totalBalance = 0;
        const dashAccounts = document.getElementById('dashboard-accounts');
        dashAccounts.innerHTML = '';
        
        accounts.forEach(acc => {
            const currentBalance = balances[acc.name] !== undefined ? balances[acc.name] : 0;
            totalBalance += currentBalance;
            dashAccounts.innerHTML += `
                <div class="card">
                    <div class="card-title">${acc.name} Account</div>
                    <div class="card-value">${formatCurrency(currentBalance)}</div>
                    <div class="account-subtitle">Initial: ${formatCurrency(acc.initialBalance)}</div>
                </div>
            `;
        });

        document.getElementById('dash-total-balance').textContent = formatCurrency(totalBalance);
        document.getElementById('dash-total-income').textContent = formatCurrency(totalIncome);
        document.getElementById('dash-total-expense').textContent = formatCurrency(totalExpense);
        document.getElementById('dash-savings').textContent = formatCurrency(totalIncome - totalExpense);

        // 4. Render Table
        const tbody = document.getElementById('transaction-table-body');
        tbody.innerHTML = '';

        if (filteredTx.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: var(--gray);">No transactions found</td></tr>';
        } else {
            filteredTx.forEach(t => {
                let accountDisplay = t.account;
                if (t.type === 'Transfer') {
                    accountDisplay = `${t.account} → ${t.toAccount}`;
                }

                // Sanitize basic strings
                const safeNotes = t.notes.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeClient = t.client ? t.client.replace(/</g, "&lt;").replace(/>/g, "&gt;") : '-';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${formatDate(t.date)}</td>
                    <td><span class="badge ${t.type.toLowerCase()}">${t.type}</span></td>
                    <td>${accountDisplay}</td>
                    <td>${t.category}</td>
                    <td class="${t.type === 'Income' ? 'text-success' : t.type === 'Expense' ? 'text-danger' : 'text-primary'}">
                        ${t.type === 'Expense' ? '-' : t.type === 'Income' ? '+' : ''}${formatCurrency(t.amount)}
                    </td>
                    <td>${safeClient}</td>
                    <td>${safeNotes}</td>
                    <td><button class="btn-danger" onclick="deleteTransaction('${t.id}')">Del</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 5. Render Client Earnings (Based on filtered transactions, or all time?)
        // Let's make it based on ALL TIME income so they see overall client value, 
        // or filtered. Let's do filtered to be consistent with the view.
        const clientList = document.getElementById('client-list');
        clientList.innerHTML = '';
        
        let clientTotals = {};
        filteredTx.forEach(t => {
            if (t.type === 'Income' && t.client) {
                const c = t.client.trim();
                clientTotals[c] = (clientTotals[c] || 0) + t.amount;
            }
        });

        const clientsArray = Object.keys(clientTotals).map(name => {
            return { name, amount: clientTotals[name] };
        }).sort((a, b) => b.amount - a.amount); // Sort by highest paying

        if (clientsArray.length === 0) {
            clientList.innerHTML = '<li class="client-item" style="color: var(--gray);">No client data yet</li>';
        } else {
            clientsArray.forEach(c => {
                const li = document.createElement('li');
                li.className = 'client-item';
                li.innerHTML = `
                    <span class="client-name">${c.name.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>
                    <span class="client-total">${formatCurrency(c.amount)}</span>
                `;
                clientList.appendChild(li);
            });
        }
    }

    // --- EXPORT LOGIC (CSV) ---
    function exportToCSV() {
        if (transactions.length === 0) {
            alert("No transactions to export.");
            return;
        }

        // CSV Headers
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Date,Type,From Account,To Account,Category,Amount,Client,Notes\n";

        // Sort for export
        const sortedTx = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

        sortedTx.forEach(t => {
            // Escape commas and quotes in notes/clients
            let notes = t.notes ? `"${t.notes.replace(/"/g, '""')}"` : "";
            let client = t.client ? `"${t.client.replace(/"/g, '""')}"` : "";
            let toAcc = t.toAccount || "";
            
            let row = `${t.date},${t.type},${t.account},${toAcc},${t.category},${t.amount},${client},${notes}`;
            csvContent += row + "\n";
        });

        // Create download link
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `finance_export_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link); // Required for Firefox
        link.click();
        document.body.removeChild(link);
    }

    // --- INITIALIZATION ---
    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();
    
    // Initial Render
    renderAccounts();
    updateMonthFilterOptions();
    renderApp();

</script>
</body>
</html>
